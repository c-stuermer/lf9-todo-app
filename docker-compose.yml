networks:
  # Internal network — only for communication between client and server
  todo-internal:
    name: todo-internal

  # External infrastructure network — shared with the reverse proxy and monitoring stack.
  # If you already have a proxy or monitoring setup, change the name below to your existing network.
  infra-network:
    name: infra-network
    external: true

services:

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    networks:
      - todo-internal
      - infra-network
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-server
    networks:
      - todo-internal
      - infra-network
    restart: always

  nginx:
    profiles: [nginx]
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/includes:/etc/nginx/includes
    depends_on:
      - client
      - server
    networks:
      - infra-network
    restart: always

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - infra-network
    restart: always

  grafana:
    profiles: [monitoring]
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - infra-network
    restart: always
