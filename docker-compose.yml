networks:
  # Internal network — only for communication between client and server
  todo-internal:
    name: todo-internal

  # Infrastructure network — shared with the reverse proxy and monitoring stack.
  # Advanced: If you already have a proxy or monitoring stack running on this host,
  # set "external: true" and change the name to your existing network. Then remove
  # the nginx/prometheus/grafana services below (or comment them out).
  infra-network:
    name: infra-network

services:

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    networks:
      - todo-internal
      - infra-network
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-server
    networks:
      - todo-internal
      - infra-network
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/includes:/etc/nginx/includes
    depends_on:
      - client
      - server
    networks:
      - infra-network
    restart: always

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - infra-network
    restart: always

  grafana:
    image: grafana/grafana
    environment:
      - GF_SERVER_DOMAIN=your-domain-or-ip
      - GF_SERVER_ROOT_URL=http://your-domain-or-ip/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - infra-network
    restart: always

volumes:
  grafana-data:
