networks:
  docker-net:
    name: docker-net

services:

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    networks:
      - docker-net
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-server
    networks:
      - docker-net
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/includes:/etc/nginx/includes
    depends_on:
      - client
      - server
    networks:
      - docker-net
    restart: always

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - docker-net
    restart: always

  node-exporter:
    image: prom/node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - docker-net
    restart: always

  grafana:
    image: grafana/grafana
    environment:
      - GF_SERVER_DOMAIN=your-domain-or-ip                   # ← replace this
      - GF_SERVER_ROOT_URL=http://your-domain-or-ip/grafana/ # ← replace this
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - docker-net
    restart: always

volumes:
  grafana-data:
