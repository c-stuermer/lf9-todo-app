networks:
  todo-network:
    name: todo-network

services:

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    networks:
      - todo-network
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-server
    networks:
      - todo-network
    restart: always

  nginx:
    profiles: [nginx]
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/includes:/etc/nginx/includes
    depends_on:
      - client
      - server
    networks:
      - todo-network
    restart: always

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - todo-network
    restart: always

  grafana:
    profiles: [monitoring]
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - todo-network
    restart: always
